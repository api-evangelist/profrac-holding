description: ProFrac Holding Corp. is a vertically integrated, innovation-driven energy services company providing hydraulic fracturing, completion services, and complementary products and services to upstream oil and gas companies engaged in the exploration and production of North American unconventional oil and natural gas resources. The company operates through portfolio brands including ProFrac, Best Pump & Flow, Alpine Silica, IO-TEQ, and Livewire Power. ProFrac Holding does not currently publish a public developer API or documentation portal.
